<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#06060f">
<title>React Live</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#06060f;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none;}
  .top{width:100%;padding:20px 20px 10px;text-align:center;}
  .match-lbl{font-size:.65rem;letter-spacing:.25em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:6px;}
  .match-name{font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.04em;}
  .status{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.1em;}
  .inactive-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center;}
  .inactive-msg .ico{font-size:3.5rem;}
  .inactive-msg p{font-size:.85rem;color:rgba(255,255,255,.35);line-height:1.5;max-width:240px;}
  .emoji-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:12px 20px 32px;width:100%;}
  .prompt{font-size:.72rem;letter-spacing:.2em;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:24px;}
  .emoji-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:320px;}
  .emoji-btn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);border-radius:18px;padding:18px 10px;font-size:2.6rem;line-height:1;cursor:pointer;transition:transform .1s,background .15s;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .emoji-btn:active{transform:scale(.91);background:rgba(255,255,255,.14);}
  .emoji-btn.fired{animation:btn-pop .3s ease;}
  @keyframes btn-pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
  .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);animation:rip .45s ease-out forwards;pointer-events:none;}
  @keyframes rip{from{width:0;height:0;opacity:.7;transform:translate(-50%,-50%)}to{width:180px;height:180px;opacity:0;transform:translate(-50%,-50%)}}
  .sent-flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 18px;font-size:.72rem;letter-spacing:.15em;color:rgba(255,255,255,.6);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  .sent-flash.show{opacity:1;}
</style>
</head>
<body>

<div class="top">
  <div class="match-lbl">LIVE MATCH</div>
  <div class="match-name" id="match-name">Loading…</div>
  <div class="status" id="status-lbl">—</div>
</div>

<div id="inactive-msg" class="inactive-msg" style="display:none">
  <div class="ico">⏸</div>
  <p>Reactions aren't active right now. Check back during the match!</p>
</div>

<div id="emoji-area" class="emoji-area" style="display:none">
  <div class="prompt">TAP TO REACT LIVE</div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div class="sent-flash" id="sent-flash">Sent!</div>

<script>
let _state = null;
let _active = false;
let _flashTimer = null;

async function loadState() {
  try {
    const r = await fetch('/api/state-pub', { cache: 'no-store' });
    if (!r.ok) throw new Error();
    _state = await r.json();
  } catch {
    try {
      // Fallback: try reading from SSE initial payload via a quick fetch
      const r2 = await fetch('/api/poll/data', { cache: 'no-store' });
    } catch {}
  }
  render();
}

// Poll state periodically — fan page doesn't need real-time state, just react stream
async function pollState() {
  try {
    const r = await fetch('/api/react/status', { cache: 'no-store' });
    if (r.ok) {
      const d = await r.json();
      const wasActive = _active;
      _active = !!d.active;
      if (_active !== wasActive) render();
      if (_active) {
        document.getElementById('match-name').textContent = d.matchName || 'Match';
        document.getElementById('status-lbl').textContent = d.status || '';
        buildGrid(d.emojis || ['🔥','🏉','👏','🎉','💪']);
      }
    }
  } catch {}
}

function buildGrid(emojis) {
  const grid = document.getElementById('emoji-grid');
  if (grid.dataset.built === emojis.join(',')) return;
  grid.dataset.built = emojis.join(',');
  grid.innerHTML = emojis.map(e =>
    `<button class="emoji-btn" onclick="sendReact('${e}', event)">${e}</button>`
  ).join('');
}

function render() {
  document.getElementById('inactive-msg').style.display = _active ? 'none' : 'flex';
  document.getElementById('emoji-area').style.display = _active ? 'flex' : 'none';
}

async function sendReact(emoji, ev) {
  // Ripple effect
  const btn = ev.currentTarget;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  ripple.style.left = (ev.clientX - rect.left) + 'px';
  ripple.style.top = (ev.clientY - rect.top) + 'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
  btn.classList.remove('fired');
  void btn.offsetWidth;
  btn.classList.add('fired');

  // Send
  try {
    await fetch('/api/react', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ emoji })
    });
    showFlash('Sent!');
  } catch {
    showFlash('Error');
  }
}

function showFlash(msg) {
  const el = document.getElementById('sent-flash');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('show'), 900);
}

pollState();
setInterval(pollState, 5000);
</script>
</body>
</html>
